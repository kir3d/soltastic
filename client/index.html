<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>soltactic client</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="header">
  <h1>soltactic client</h1>
  <p>Solana x Meshtastic</p>
</div>

<div class="grid">

  <div class="card">
    <div class="card-title">
      <div class="dot" id="sol-dot"></div>
      <span>Solana Wallet</span>
    </div>

    <div class="info-row" id="sol-info">
      Кошелёк не подключён
    </div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-sol" id="sol-connect-btn">◎ Подключить</button>
      <button class="btn btn-outline" id="sol-disconnect-btn" disabled>Отключить</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="dot" id="mesh-dot"></div>
      <span>Meshtastic Node</span>
    </div>

    <div class="info-row" id="mesh-info">
      Нода не подключена
    </div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-mesh" id="mesh-connect-btn">⬡ Подключить BLE</button>
      <button class="btn btn-outline" id="mesh-disconnect-btn" disabled>Отключить</button>
    </div>
  </div>

  <div class="card ping-card">
    <div class="card-title">
      <span>📡 Init message</span>
      <span style="margin-left:auto;color:#666">slot 7</span>
    </div>

    <div class="ping-inner">
      <input id="msg-input" value="ST,init,<wallet>" disabled>
      <button class="btn btn-mesh" id="send-btn" disabled>▶ Отправить</button>
    </div>

    <div id="send-status" class="info-row" style="display:none"></div>
  </div>

  <div class="card log-section">
    <div class="card-title">
      <span>🗒 Лог</span>
      <button id="clear-log-btn" class="btn btn-outline" style="margin-left:auto">Очистить</button>
    </div>

    <div class="log-body" id="log"></div>
  </div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
