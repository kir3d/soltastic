<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>soltactic client</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="header">
  <h1>soltactic client</h1>
  <p>Solana x Meshtastic</p>
</div>

<div class="grid">

  <div class="card">
    <div class="card-title">
      <div class="dot" id="sol-dot"></div>
      <span>Solana Wallet</span>
    </div>

    <div class="info-row" id="sol-info">
      Wallet not connected
    </div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-sol" id="sol-connect-btn">◎ Connect</button>
      <button class="btn btn-outline" id="sol-disconnect-btn" disabled>Disconnect</button>
    </div>
    <div class="balance-actions" id="balance-actions" hidden>
      <button class="btn btn-balance" id="sol-balance-btn">SOL: -</button>
      <button class="btn btn-balance" id="usdc-balance-btn">USDC: -</button>
    </div>

    <div class="transfer-form" id="transfer-form" hidden>
      <div class="transfer-title" id="transfer-title">SEND</div>

      <input id="receiver-input" placeholder="receiver address R">
      <input id="amount-input" placeholder="amount">

      <button class="btn btn-sol" id="transfer-send-btn">SEND</button>

      <div id="transfer-status" class="info-row" style="display:none"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="dot" id="mesh-dot"></div>
      <span>Meshtastic Node</span>
    </div>

    <div class="info-row" id="mesh-info">
      Node not connected
    </div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-mesh" id="mesh-connect-btn">⬡ Connect BLE</button>
      <button class="btn btn-outline" id="mesh-disconnect-btn" disabled>Disconnect</button>
    </div>
  </div>

  <div class="card ping-card">
    <div class="card-title">
      <span>📡 Init message</span>
      <span style="margin-left:auto;color:#666">slot 7</span>
    </div>

    <div class="ping-inner">
      <input id="msg-input" value="ST,init,<wallet>" disabled>
      <button class="btn btn-mesh" id="send-btn" disabled>▶ Send</button>
    </div>

    <div id="send-status" class="info-row" style="display:none"></div>
  </div>

  <div class="card log-section">
    <div class="card-title">
      <span>🗒 Log</span>
      <button id="clear-log-btn" class="btn btn-outline" style="margin-left:auto">Clear</button>
    </div>

    <div class="log-body" id="log"></div>
  </div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
