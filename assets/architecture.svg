<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 600" width="100%" height="100%">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @keyframes circle1 { 0%,3% { opacity:0; } 4%,96% { opacity:1; } 97%,100% { opacity:0; } }
    @keyframes circle2 { 0%,17% { opacity:0; } 18%,96% { opacity:1; } 97%,100% { opacity:0; } }
    @keyframes circle3 { 0%,31% { opacity:0; } 32%,96% { opacity:1; } 97%,100% { opacity:0; } }
    @keyframes circle4 { 0%,45% { opacity:0; } 46%,96% { opacity:1; } 97%,100% { opacity:0; } }
    @keyframes circle5 { 0%,60% { opacity:0; } 61%,96% { opacity:1; } 97%,100% { opacity:0; } }
    
    @keyframes slideRight1 { 0%,3% { opacity:0; transform:translateX(-30px); } 4%,96% { opacity:1; transform:translateX(0); } 97%,100% { opacity:0; transform:translateX(30px); } }
    @keyframes slideRight3 { 0%,31% { opacity:0; transform:translateX(-30px); } 32%,96% { opacity:1; transform:translateX(0); } 97%,100% { opacity:0; transform:translateX(30px); } }
    @keyframes slideRight4 { 0%,45% { opacity:0; transform:translateX(-30px); } 46%,96% { opacity:1; transform:translateX(0); } 97%,100% { opacity:0; transform:translateX(30px); } }
    
    @keyframes slideLeft2 { 0%,17% { opacity:0; transform:translateX(30px); } 18%,96% { opacity:1; transform:translateX(0); } 97%,100% { opacity:0; transform:translateX(-30px); } }
    @keyframes slideLeft5 { 0%,60% { opacity:0; transform:translateX(30px); } 61%,96% { opacity:1; transform:translateX(0); } 97%,100% { opacity:0; transform:translateX(-30px); } }

    @keyframes dashRight { from { stroke-dashoffset: 15; } to { stroke-dashoffset: 0; } }
    @keyframes dashLeft { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -15; } }

    .circle1 { opacity:0; animation: circle1 14s ease-in-out infinite; }
    .circle2 { opacity:0; animation: circle2 14s ease-in-out infinite; }
    .circle3 { opacity:0; animation: circle3 14s ease-in-out infinite; }
    .circle4 { opacity:0; animation: circle4 14s ease-in-out infinite; }
    .circle5 { opacity:0; animation: circle5 14s ease-in-out infinite; }
    
    .content1 { opacity:0; animation: slideRight1 14s ease-in-out infinite; }
    .content2 { opacity:0; animation: slideLeft2 14s ease-in-out infinite; }
    .content3 { opacity:0; animation: slideRight3 14s ease-in-out infinite; }
    .content4 { opacity:0; animation: slideRight4 14s ease-in-out infinite; }
    .content5 { opacity:0; animation: slideLeft5 14s ease-in-out infinite; }
    
    .desc-box-purple { stroke: #667eea; stroke-width: 1; }
    .desc-box-pink { stroke: #f5576c; stroke-width: 1; }
    .dash-right { stroke-dasharray: 10,5; animation: dashRight 0.4s linear infinite; }
    .dash-left { stroke-dasharray: 10,5; animation: dashLeft 0.4s linear infinite; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="950" height="600" fill="url(#bgGrad)"/>

  <!-- Connection labels at top -->
  <rect x="155" y="20" width="300" height="25" rx="5" fill="none" stroke="#67EA94" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="305" y="37" text-anchor="middle" fill="#67EA94" font-family="Arial, sans-serif" font-size="10">⚡ Meshtastic Radio Link</text>
  <rect x="495" y="20" width="300" height="25" rx="5" fill="none" stroke="#9945FF" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="645" y="37" text-anchor="middle" fill="#9945FF" font-family="Arial, sans-serif" font-size="10">🌐 Internet / RPC</text>

  <!-- Entities -->
  <rect x="75" y="60" width="120" height="50" rx="10" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="135" y="90" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">CLIENT</text>
  <rect x="415" y="60" width="120" height="50" rx="10" fill="url(#serverGrad)" filter="url(#shadow)"/>
  <text x="475" y="90" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">SERVER</text>
  <rect x="755" y="60" width="120" height="50" rx="10" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="815" y="82" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Solana</text>
  <text x="815" y="100" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">RPC Node</text>

  <!-- Vertical lines -->
  <line x1="135" y1="110" x2="135" y2="570" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="475" y1="110" x2="475" y2="570" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="815" y1="110" x2="815" y2="570" stroke="#9945FF" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>

  <!-- Step 1: Init - Meshtastic green -->
  <g class="circle1">
    <circle cx="55" cy="160" r="18" fill="#67EA94"/>
    <text x="55" y="165" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
  </g>
  <g class="content1">
    <line x1="135" y1="160" x2="465" y2="160" stroke="#67EA94" stroke-width="2" class="dash-right"/>
    <polygon points="465,160 455,155 455,165" fill="#67EA94"/>
    <rect x="225" y="140" width="140" height="30" rx="5" fill="#2d2d44" class="desc-box-purple"/>
    <text x="295" y="160" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">init (pubkey)</text>
    <text x="295" y="185" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Client Initialization</text>
  </g>

  <!-- Step 2: Balances + Durable Nonce - Meshtastic green -->
  <g class="circle2">
    <circle cx="55" cy="250" r="18" fill="#67EA94"/>
    <text x="55" y="255" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2</text>
  </g>
  <g class="content2">
    <line x1="475" y1="250" x2="145" y2="250" stroke="#67EA94" stroke-width="2" class="dash-left"/>
    <polygon points="145,250 155,245 155,255" fill="#67EA94"/>
    <rect x="210" y="230" width="170" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="295" y="250" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">balances + durable nonce</text>
    <text x="295" y="275" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Server Response</text>
  </g>

  <!-- Step 3: Metadata + Signature - Meshtastic green -->
  <g class="circle3">
    <circle cx="55" cy="340" r="18" fill="#67EA94"/>
    <text x="55" y="345" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
  </g>
  <g class="content3">
    <line x1="135" y1="340" x2="465" y2="340" stroke="#67EA94" stroke-width="2" class="dash-right"/>
    <polygon points="465,340 455,335 455,345" fill="#67EA94"/>
    <rect x="205" y="320" width="180" height="30" rx="5" fill="#2d2d44" class="desc-box-purple"/>
    <text x="295" y="340" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">metadata + signature</text>
    <text x="295" y="365" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Client Metadata Submission</text>
  </g>

  <!-- Step 4: Transaction Assembly - Solana purple -->
  <g class="circle4">
    <circle cx="55" cy="430" r="18" fill="#9945FF"/>
    <text x="55" y="435" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4</text>
  </g>
  <g class="content4">
    <line x1="475" y1="430" x2="805" y2="430" stroke="#9945FF" stroke-width="2" class="dash-right"/>
    <polygon points="805,430 795,425 795,435" fill="#9945FF"/>
    <rect x="565" y="410" width="160" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="645" y="430" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">assembled transaction</text>
    <text x="645" y="455" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Transaction Assembly</text>
  </g>

  <!-- Step 5: TX Hash - Meshtastic green -->
  <g class="circle5">
    <circle cx="55" cy="520" r="18" fill="#67EA94"/>
    <text x="55" y="525" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
  </g>
  <g class="content5">
    <line x1="475" y1="520" x2="145" y2="520" stroke="#67EA94" stroke-width="2" class="dash-left"/>
    <polygon points="145,520 155,515 155,525" fill="#67EA94"/>
    <rect x="225" y="500" width="140" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="295" y="520" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">tx hash</text>
    <text x="295" y="545" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Transaction Confirmation</text>
  </g>
</svg>
