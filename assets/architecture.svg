<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="860" height="620">
  <defs>
    <style>
      .title    { font: bold 20px 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .actor    { font: bold 13px 'Segoe UI', sans-serif; fill: #f8fafc; }
      .label    { font: 11px 'Segoe UI', sans-serif; fill: #94a3b8; }
      .msg      { font: 11px 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .step-num { font: bold 11px 'Segoe UI', sans-serif; fill: #0f172a; }
      .step-lbl { font: bold 12px 'Segoe UI', sans-serif; fill: #f8fafc; }
      .step-sub { font: 10px 'Segoe UI', sans-serif; fill: #94a3b8; }
      .hash     { font: 10px 'Courier New', monospace; fill: #4ade80; }
    </style>

    <!-- Dark bg gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Actor box gradients -->
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="meshGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="rpcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Step pill gradient -->
    <linearGradient id="stepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Glow filter for arrows -->
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrowhead markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="860" height="620" fill="url(#bgGrad)" rx="12"/>
  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="860" y2="100"/>
    <line x1="0" y1="600" x2="860" y2="600"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="430" y="38" text-anchor="middle" class="title">
    Soltastic — Solana over Meshtastic
  </text>
  <text x="430" y="56" text-anchor="middle" class="label">Protocol Flow Architecture</text>

  <!-- ===== ACTOR COLUMNS (x positions: 110, 300, 520, 730) ===== -->

  <!-- CLIENT -->
  <rect x="60" y="68" width="100" height="36" rx="8" fill="url(#clientGrad)" filter="url(#boxGlow)"/>
  <text x="110" y="91" text-anchor="middle" class="actor">CLIENT</text>
  <text x="110" y="107" text-anchor="middle" class="label">📱 Mobile</text>

  <!-- SERVER -->
  <rect x="250" y="68" width="100" height="36" rx="8" fill="url(#serverGrad)" filter="url(#boxGlow)"/>
  <text x="300" y="91" text-anchor="middle" class="actor">SERVER</text>
  <text x="300" y="107" text-anchor="middle" class="label">🖥 Relay</text>

  <!-- MESHTASTIC NODE -->
  <rect x="468" y="68" width="104" height="36" rx="8" fill="url(#meshGrad)" filter="url(#boxGlow)"/>
  <text x="520" y="91" text-anchor="middle" class="actor">MESH NODE</text>
  <text x="520" y="107" text-anchor="middle" class="label">📡 LoRa</text>

  <!-- SOLANA RPC -->
  <rect x="678" y="68" width="104" height="36" rx="8" fill="url(#rpcGrad)" filter="url(#boxGlow)"/>
  <text x="730" y="91" text-anchor="middle" class="actor">SOLANA RPC</text>
  <text x="730" y="107" text-anchor="middle" class="label">⛓ Blockchain</text>

  <!-- ===== LIFELINES ===== -->
  <line x1="110" y1="104" x2="110" y2="595" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="300" y1="104" x2="300" y2="595" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="520" y1="104" x2="520" y2="595" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="730" y1="104" x2="730" y2="595" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- ================================================================
       STEP 1  —  Client Initialization  (y ~ 155)
       Client → Server: init request
       ================================================================ -->
  <rect x="14" y="133" width="180" height="44" rx="6" fill="url(#stepGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
  </rect>
  <rect x="14" y="133" width="6" height="44" rx="3" fill="#6366f1" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
  </rect>
  <text x="26" y="150" class="step-lbl" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
    Step 1
  </text>
  <text x="26" y="165" class="step-sub" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
    Client Initialization
  </text>

  <!-- arrow Client→Server -->
  <line x1="118" y1="157" x2="288" y2="157" stroke="#a78bfa" stroke-width="2"
    marker-end="url(#arr-purple)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
    <animate attributeName="x2" values="118;288" dur="0.4s" begin="0.7s" fill="freeze"/>
  </line>
  <rect x="155" y="143" width="100" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
  </rect>
  <text x="205" y="155" text-anchor="middle" class="msg" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
    init_request { }
  </text>

  <!-- ================================================================
       STEP 2  —  Server Response  (y ~ 230)
       Server → Client: balance + durable nonce
       ================================================================ -->
  <rect x="14" y="208" width="180" height="44" rx="6" fill="url(#stepGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
  </rect>
  <rect x="14" y="208" width="6" height="44" rx="3" fill="#0ea5e9" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
  </rect>
  <text x="26" y="225" class="step-lbl" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
    Step 2
  </text>
  <text x="26" y="240" class="step-sub" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
    Server Response
  </text>

  <!-- Server fetches from RPC first -->
  <line x1="308" y1="220" x2="718" y2="220" stroke="#fbbf24" stroke-width="1.5"
    stroke-dasharray="5 3" marker-end="url(#arr-yellow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
  </line>
  <text x="513" y="215" text-anchor="middle" class="label" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
    getBalance + getNonce
  </text>
  <!-- RPC → Server -->
  <line x1="722" y1="234" x2="312" y2="234" stroke="#64748b" stroke-width="1.5"
    stroke-dasharray="5 3" marker-end="url(#arr-back)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.9s" fill="freeze"/>
  </line>
  <text x="513" y="245" text-anchor="middle" class="label" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.9s" fill="freeze"/>
    balance + durable_nonce
  </text>

  <!-- Server → Client response -->
  <line x1="292" y1="258" x2="122" y2="258" stroke="#38bdf8" stroke-width="2"
    marker-end="url(#arr-blue)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </line>
  <rect x="138" y="248" width="136" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </rect>
  <text x="205" y="260" text-anchor="middle" class="msg" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
    { balance, nonce }
  </text>

  <!-- ================================================================
       STEP 3  —  Metadata Submission  (y ~ 320)
       Client → Server: metadata + signature
       ================================================================ -->
  <rect x="14" y="293" width="180" height="44" rx="6" fill="url(#stepGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
  </rect>
  <rect x="14" y="293" width="6" height="44" rx="3" fill="#10b981" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
  </rect>
  <text x="26" y="310" class="step-lbl" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
    Step 3
  </text>
  <text x="26" y="325" class="step-sub" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
    Metadata Submission
  </text>

  <line x1="118" y1="315" x2="288" y2="315" stroke="#a78bfa" stroke-width="2"
    marker-end="url(#arr-purple)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.1s" fill="freeze"/>
  </line>
  <rect x="130" y="301" width="148" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.1s" fill="freeze"/>
  </rect>
  <text x="205" y="313" text-anchor="middle" class="msg" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.1s" fill="freeze"/>
    { metadata, signature }
  </text>

  <!-- ================================================================
       STEP 4  —  Transaction Assembly  (y ~ 390)
       Server builds tx → sends to Mesh Node → Node → RPC
       ================================================================ -->
  <rect x="14" y="368" width="180" height="44" rx="6" fill="url(#stepGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.6s" fill="freeze"/>
  </rect>
  <rect x="14" y="368" width="6" height="44" rx="3" fill="#f59e0b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.6s" fill="freeze"/>
  </rect>
  <text x="26" y="385" class="step-lbl" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.6s" fill="freeze"/>
    Step 4
  </text>
  <text x="26" y="400" class="step-sub" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.6s" fill="freeze"/>
    Transaction Assembly
  </text>

  <!-- Server → Mesh Node (LoRa packet) -->
  <line x1="308" y1="385" x2="508" y2="385" stroke="#34d399" stroke-width="2"
    marker-end="url(#arr-green)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.9s" fill="freeze"/>
  </line>
  <rect x="332" y="371" width="150" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.9s" fill="freeze"/>
  </rect>
  <text x="408" y="383" text-anchor="middle" class="msg" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.9s" fill="freeze"/>
    LoRa packet (tx_data)
  </text>

  <!-- Mesh Node → Solana RPC -->
  <line x1="528" y1="405" x2="718" y2="405" stroke="#fbbf24" stroke-width="2"
    marker-end="url(#arr-yellow)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.3s" fill="freeze"/>
  </line>
  <rect x="548" y="391" width="150" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.3s" fill="freeze"/>
  </rect>
  <text x="623" y="403" text-anchor="middle" class="msg" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.3s" fill="freeze"/>
    sendTransaction(tx)
  </text>

  <!-- ================================================================
       STEP 5  —  Transaction Confirmation  (y ~ 470)
       RPC → Mesh → Server → Client: tx hash
       ================================================================ -->
  <rect x="14" y="443" width="180" height="44" rx="6" fill="url(#stepGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="4.8s" fill="freeze"/>
  </rect>
  <rect x="14" y="443" width="6" height="44" rx="3" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="4.8s" fill="freeze"/>
  </rect>
  <text x="26" y="460" class="step-lbl" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="4.8s" fill="freeze"/>
    Step 5
  </text>
  <text x="26" y="475" class="step-sub" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="4.8s" fill="freeze"/>
    TX Confirmation
  </text>

  <!-- RPC → Mesh Node -->
  <line x1="722" y1="458" x2="532" y2="458" stroke="#64748b" stroke-width="1.5"
    stroke-dasharray="5 3" marker-end="url(#arr-back)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.0s" fill="freeze"/>
  </line>
  <rect x="548" y="444" width="150" height="16" rx="4" fill="#1e293b" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.0s" fill="freeze"/>
  </rect>
  <text x="623" y="456" text-anchor="middle" class="hash" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.0s" fill="freeze"/>
    tx_hash confirmed
  </text>

  <!-- Mesh → Server -->
  <line x1="512" y1="476" x2="312" y2="476" stroke="#34d399" stroke-width="1.5"
    stroke-dasharray="5 3" marker-end="url(#arr-green)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.3s" fill="freeze"/>
  </line>
  <!-- Server → Client final -->
  <line x1="292" y1="494" x2="122" y2="494" stroke="#38bdf8" stroke-width="2.5"
    marker-end="url(#arr-blue)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.6s" fill="freeze"/>
  </line>
  <rect x="122" y="480" width="170" height="16" rx="4" fill="#0f172a" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.6s" fill="freeze"/>
  </rect>
  <text x="205" y="492" text-anchor="middle" class="hash" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.6s" fill="freeze"/>
    { tx_hash: "5xYz…kQ" }
  </text>

  <!-- ================================================================
       SUCCESS BANNER
       ================================================================ -->
  <rect x="200" y="528" width="460" height="52" rx="10" fill="#14532d" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="6.1s" fill="freeze"/>
  </rect>
  <rect x="200" y="528" width="460" height="52" rx="10" fill="none"
    stroke="#22c55e" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="6.1s" fill="freeze"/>
  </rect>
  <text x="430" y="550" text-anchor="middle" class="step-lbl" fill="#4ade80" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="6.1s" fill="freeze"/>
    ✅  Transaction Confirmed on Solana
  </text>
  <text x="430" y="568" text-anchor="middle" class="label" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="6.1s" fill="freeze"/>
    Solana blockchain transaction delivered over LoRa mesh — no internet required
  </text>

  <!-- ================================================================
       BOTTOM LEGEND
       ================================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="6.5s" fill="freeze"/>
    <line x1="212" y1="600" x2="240" y2="600" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr-purple)"/>
    <text x="245" y="604" class="label">request</text>
    <line x1="310" y1="600" x2="338" y2="600" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr-blue)"/>
    <text x="343" y="604" class="label">response</text>
    <line x1="412" y1="600" x2="440" y2="600" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-yellow)"/>
    <text x="445" y="604" class="label">RPC call</text>
    <line x1="510" y1="600" x2="538" y2="600" stroke="#34d399" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="543" y="604" class="label">LoRa / mesh</text>
    <line x1="625" y1="600" x2="653" y2="600" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-back)"/>
    <text x="658" y="604" class="label">confirm</text>
  </g>

</svg>
